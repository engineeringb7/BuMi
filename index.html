<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuMi — Building Maintenance Monitoring Integration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="page-login" class="page active">
    <div class="login-bg">
      <div class="login-orb orb-1"></div>
      <div class="login-orb orb-2"></div>
      <div class="login-orb orb-3"></div>
      <div class="login-grid-pattern"></div>
    </div>
    <div class="login-wrapper">
      <button class="theme-toggle-login" id="theme-toggle-login" title="Ganti tema">
        <svg id="icon-sun-login" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon-login" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
          <div class="bm-mark">
            <div class="bm-mark-inner">
              <span class="bm-letter-B">B</span>
              <span class="bm-letter-M">M</span>
            </div>
          </div>
          <div class="logo-text-group">
            <span class="logo-wordmark-bm">BuMi</span>
            <span class="logo-tagline">Building Maintenance Monitoring Integration</span>
          </div>
        </div>

        <div class="login-divider"></div>

        <div class="login-heading">
          <h2>Selamat Datang</h2>
          <p>Masuk untuk mengakses sistem monitoring</p>
        </div>

        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="nik">NIK Karyawan</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="13" rx="2.5"/><path d="M8 8V6a4 4 0 018 0v2"/><circle cx="12" cy="14" r="1.5"/></svg>
              </span>
              <input type="text" id="nik" class="form-input" placeholder="Masukkan NIK" />
            </div>
            <span class="field-error" id="nik-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2.5"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input type="password" id="password" class="form-input" placeholder="Masukkan password" />
              <button type="button" class="toggle-pass" id="toggle-pass" tabindex="-1">
                <svg id="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="eye-closed" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <span class="field-error" id="pass-error"></span>
          </div>

          <span class="field-error" id="login-error" style="display:block;text-align:center;margin-bottom:10px;"></span>

          <button type="submit" class="btn-primary btn-full" id="login-btn">
            <span class="btn-text">Masuk</span>
            <span class="btn-loader" style="display:none"><span class="spinner"></span></span>
          </button>
        </form>

        <p class="login-footer">BuMi v4.1 &copy; 2025 — PT Bintang Toedjoe</p>
        <p class="login-creator">Created with Curiousity by <a href="https://www.linkedin.com/in/muhamad-adha-ismail" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none"><strong>Adha</strong></a> (BTS Batch 5)</p>
      </div>
    </div>
  </div>

  <!-- APP ROOT -->
  <div id="app-root"></div>

  <!-- NOTIFICATION TOAST -->
  <div class="notification" id="notification">
    <div class="notif-icon">
      <svg id="notif-icon-success" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <svg id="notif-icon-error" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="notif-body">
      <p class="notif-title" id="notif-title">Berhasil!</p>
      <p class="notif-desc" id="notif-desc">Operasi berhasil dilakukan.</p>
    </div>
    <button class="notif-close" id="notif-close">✕</button>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
